# Guardrails so a newcomer cannot break the repo or leak a secret.
# Enable with: pip install pre-commit && pre-commit install  (make setup does this)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key      # block committed private keys
      - id: check-added-large-files # block giant binaries / accidental data dumps
        args: ["--maxkb=1024"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
      - id: check-yaml
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets          # secret scanning (.env, tokens, keys)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff                    # lint
