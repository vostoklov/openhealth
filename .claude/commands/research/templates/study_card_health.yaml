# Study Card Schema — Health / Nutrition / Pharmacology Domain
# Loaded by ORCHESTRATOR when domain = health
# Used by: SCOUT (produces), METHODOLOGIST (reads), DD (reads), SYNTHESIZER (cites card_ids)
#
# Each SCOUT produces stream_X_study_cards.md — a markdown file with one card per study.
# Cards rendered as markdown tables; the schema below defines mandatory and optional fields.

version: 1.0
domain: health

# ============================================================================
# CARD ID
# ============================================================================
# Format: card_<stream>_<n>   e.g., card_a_03, card_d_11
# Must be unique within the research folder. SYNTHESIZER cites these.

# ============================================================================
# REQUIRED FIELDS — every card MUST fill these
# ============================================================================

required:
  meta:
    pmid_or_doi: string           # PubMed ID, DOI, or "preprint:arxiv:..."
    title: string
    year: int
    journal: string
    first_author: string

  design:
    type: enum                     # RCT | cohort_prospective | cohort_retrospective | case_control | cross_sectional | SR | MA | mechanistic_in_vitro | animal | case_series | n_of_1
    blinding: enum                 # double_blind | single_blind | open_label | n/a
    randomization: enum            # randomized | quasi_random | non_random | n/a
    duration_weeks: number_or_null

  population:
    n_total: int
    n_per_arm: list_or_null         # [intervention_n, control_n]
    age_mean: number_or_null
    age_range: string_or_null       # "18-65"
    sex_distribution: string         # "M:F = 0.45:0.55" or "all_female" or "all_male"
    ethnicity: string_or_null
    key_inclusion: string            # 1-line summary
    key_exclusion: string            # 1-line summary
    relevance_to_user: enum          # HIGH | MED | LOW | NA — SCOUT's judgment for personalized mode

  intervention:
    agent: string                    # e.g., "Lithium orotate"
    dose: string                     # e.g., "5 mg/day" — include units
    duration: string                 # e.g., "12 weeks"
    route: enum                      # oral | iv | sublingual | topical | inhaled | other | n/a
    comparator: string               # "placebo" | "vehicle" | "active: lithium carbonate 300mg" | etc.

  primary_outcome:
    definition: string
    effect_size_value: number_or_null
    effect_size_type: enum           # cohens_d | OR | RR | HR | mean_diff | percent_change | r | other
    ci_lower: number_or_null
    ci_upper: number_or_null
    p_value: number_or_null
    direction: enum                  # benefit | harm | no_effect | mixed
    clinical_significance: enum      # statistically_significant_only | clinically_meaningful | null_result | inconclusive

  methodological_quality:
    tool: enum                       # ROB_2_0 | NOS | AMSTAR_2 | none_applicable
    assessment: enum                 # low_risk | some_concerns | high_risk | n/a
    grade: enum                      # HIGH | MODERATE | LOW | VERY_LOW
    grade_rationale: string          # 1-2 sentences

  funding_and_coi:
    funding_source: string           # e.g., "NIH R01" | "industry: Pfizer" | "not reported"
    coi_disclosed: bool
    coi_flagged: bool                # SCOUT's judgment: any concerning ties?

# ============================================================================
# OPTIONAL FIELDS — fill if available, helpful for METHODOLOGIST and SYNTHESIZER
# ============================================================================

optional:
  replication_status: enum           # replicated | contested | single | failed_replication | unknown
  related_meta_analysis: string      # PMID/DOI of MA that includes this study, if known

  secondary_outcomes:                # list of 1-3 most relevant
    - definition: string
      effect: string                 # free text — effect size + direction
      p_value: number_or_null

  subgroup_findings: string          # 1-2 lines if pre-specified subgroup interactions reported

  population_specific_caveats: string  # e.g., "all male", "no women >50", "excluded depression history"

  methodologist_notes: string         # filled by METHODOLOGIST in Cycle 1
                                      # SCOUT leaves this empty; METHODOLOGIST fills with quality concerns,
                                      # GRADE adjustments, or flags for follow-up

  applicability_constraints:          # for personalized mode — when does this NOT apply to user?
    - constraint: string              # e.g., "excluded ferritin <30"
      relevance_to_user: enum         # USER_VIOLATES | USER_MEETS | UNKNOWN

# ============================================================================
# RENDERING — how cards appear in stream_X_study_cards.md
# ============================================================================
# Each card is a markdown subsection with a table OR a YAML block.
# Preferred: markdown table for readability + YAML block at end for machine parsing.
#
# Example output (one card):
#
# ### card_a_03 — Lithium drinking water cohort (Texas)
#
# | Field | Value |
# |-------|-------|
# | PMID/DOI | 1990-PMID:2230807 |
# | Year | 1990 |
# | Journal | Biol Trace Elem Res |
# | Design | cohort_retrospective, open_label, n/a-randomization |
# | n_total | 27 counties, ~3.5M residents |
# | Population | mixed age/sex, Texas counties |
# | Intervention | natural Li in tap water 70-170 µg/L |
# | Primary outcome | suicide rate (per 100k) — Li-high counties vs Li-low |
# | Effect | -40% suicide rate (p<0.01) |
# | GRADE | VERY_LOW (ecological design, no individual exposure) |
# | Relevance to user | MED (informs background hypothesis only, not dosing) |
# | Funding/COI | not_reported / no flag |
#
# ```yaml
# # machine-parseable block — used by METHODOLOGIST and SYNTHESIZER
# card_id: card_a_03
# pmid_or_doi: "PMID:2230807"
# design.type: cohort_retrospective
# methodological_quality.grade: VERY_LOW
# population.relevance_to_user: MED
# ```

# ============================================================================
# RULES FOR SCOUT
# ============================================================================
rules_for_scout:
  - "Produce ≥10 cards per stream — the top-quality studies you cite in stream_X_narrative.md."
  - "Each numerical claim in stream_X_narrative.md must be backed by at least one card_id."
  - "If a field is genuinely not reported, write 'not_reported' — do not guess."
  - "GRADE assessment is mandatory. If you cannot assess, write 'unable_to_assess: <reason>'."
  - "relevance_to_user requires reading context.md user profile. If not personalized mode, write 'NA'."
  - "Do NOT fill methodologist_notes — METHODOLOGIST owns that field."
  - "Mechanistic in vitro and animal studies CAN be carded — design.type captures that, GRADE will be LOW/VERY_LOW."
  - "Preprints allowed — note venue as 'preprint:server' and peer_review_status: false."
